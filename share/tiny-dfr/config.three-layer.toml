# Three-layer configuration example for tiny-dfr
# This demonstrates a modern three-layer setup with advanced features:
# - SystemInfoLayer (Default): System stats with stacked layout and icons
# - PrimaryLayer (FN pressed once): F-keys
# - MediaLayer (FN double-press): Laptop controls (brightness, audio, media)
#
# Features demonstrated:
# - DefaultLayer: Choose which layer appears on startup
# - Stacked: Icon on left, text stacked vertically on right for better readability
# - FontSize: Global and per-button font size customization
# - Icons: Add visual icons to system info displays
# - Command: Execute shell commands on button press
# - DoublePressSwitchLayers: Quick layer switching
#
# Copy this to /etc/tiny-dfr/config.toml to use it.

# Default layer to show on startup
# Options: "SystemInfo", "FKeys", "Media"
DefaultLayer = "SystemInfo"

# Display settings
ShowButtonOutlines = true
EnablePixelShift = false

# Font settings
FontTemplate = ":bold"
FontSize = 20.0  # Global font size (can be overridden per-button)

# Brightness settings
AdaptiveBrightness = true
ActiveBrightness = 128

# Double-press FN within 200ms to cycle through layers
# Set to 0 to disable double-press layer switching
DoublePressSwitchLayers = 200

# ESC key configuration
ShowEscKey = false

# Keep root privileges for Hyprland IPC access
# Set to false if Hyprland runs as your user and tiny-dfr runs with sudo
DropPrivileges = false

# SYSTEM INFO LAYER: Modern dashboard with stacked layout
# This is the default view showing system stats with icons
SystemInfoLayerKeys = [
    # CPU usage with stacked layout: icon left, percentage right
    # Smaller font size for compact display
    { 
        Icon = "cpu", 
        CpuUsage = true, 
        Stacked = true,
        FontSize = 16.0,
        Action = [], 
        Stretch = 2,
        Command = "kitty htop"  # Optional: open htop when pressed
    },
    
    # Memory usage with stacked layout: icon left, used/total stacked right with labels
    # Layout:  |       |  used: X.XG  |
    #          | logo  |              |
    #          |       |  total: X.XG |
    { 
        Icon = "memory", 
        MemoryUsage = true, 
        Stacked = true,
        FontSize = 16.0,
        Action = [], 
        Stretch = 2,
        Command = "kitty htop"  # Optional: open htop when pressed
    },
    
    # Active window title (horizontal, default font)
    { 
        ActiveWindow = true, 
        Action = [], 
        Stretch = 4 
    },
    
    # Active workspace with stacked layout: icon left, workspace name right
    { 
        Icon = "window",
        ActiveWorkspace = true, 
        Stacked = true,
        FontSize = 16.0,
        Action = [], 
        Stretch = 1,
        Command = "rofi -show window"  # Optional: show window switcher
    },
    
    # Battery with stacked layout: icon left, percentage & profile stacked right
    # Layout:  |       |  percentage |
    #          | logo  |             |
    #          |       |  profile    |
    { 
        Battery = "both", 
        Stacked = true,
        FontSize = 16.0,
        Action = [], 
        Stretch = 2,
        Command = "/usr/share/tiny-dfr/cycle-power-profile.sh"  # Optional: cycle power profiles
    },
    
    # Time and date (horizontal, default font)
    { 
        Time = "24hr", 
        Action = [], 
        Stretch = 2 
    }
]

# PRIMARY LAYER: F-keys (accessed by pressing FN once)
PrimaryLayerKeys = [
    { Text = "F1",  Action = "F1"  },
    { Text = "F2",  Action = "F2"  },
    { Text = "F3",  Action = "F3"  },
    { Text = "F4",  Action = "F4"  },
    { Text = "F5",  Action = "F5"  },
    { Text = "F6",  Action = "F6"  },
    { Text = "F7",  Action = "F7"  },
    { Text = "F8",  Action = "F8"  },
    { Text = "F9",  Action = "F9"  },
    { Text = "F10", Action = "F10" },
    { Text = "F11", Action = "F11" },
    { Text = "F12", Action = "F12" }
]

# MEDIA LAYER: Laptop controls (accessed by double-pressing FN)
MediaLayerKeys = [
    # Brightness controls
    { Icon = "brightness_low",  Action = "BrightnessDown" },
    { Icon = "brightness_high", Action = "BrightnessUp"   },
    
    # Microphone
    { Icon = "mic_off",         Action = "MicMute"        },
    
    # Search
    { Icon = "search",          Action = "Search"         },
    
    # Keyboard backlight
    { Icon = "backlight_low",   Action = "IllumDown"      },
    { Icon = "backlight_high",  Action = "IllumUp"        },
    
    # Media controls
    { Icon = "fast_rewind",     Action = "PreviousSong"   },
    { Icon = "play_pause",      Action = "PlayPause"      },
    { Icon = "fast_forward",    Action = "NextSong"       },
    
    # Volume controls
    { Icon = "volume_off",      Action = "Mute"           },
    { Icon = "volume_down",     Action = "VolumeDown"     },
    { Icon = "volume_up",       Action = "VolumeUp"       }
]

# USAGE NOTES:
# 
# Stacked Layout:
#   Set Stacked = true for a stacked layout: icon on the left, text on the right
#   For buttons with multiple text items (Battery, Memory), text is stacked vertically
#   
#   Battery layout:     |       |  XX%        |
#                       | icon  |             |
#                       |       |  profile    |
#   
#   Memory layout:      |       |  used: X.XG  |
#                       | icon  |              |
#                       |       |  total: X.XG |
#   
#   CPU/Workspace:      | icon  |  text       |  (single line text)
#
# Font Size:
#   FontSize at the top sets the global default (20.0 in this config)
#   Add FontSize = 16.0 to individual buttons to override
#   Smaller fonts work well with stacked layout for compact displays
#
# Commands:
#   Add Command = "your-shell-command" to execute a command when button is pressed
#   Examples:
#     - "kitty htop" - Open htop in kitty terminal
#     - "powerprofilesctl set balanced" - Set power profile
#     - "hyprctl dispatch workspace 1" - Switch workspace
#     - "rofi -show window" - Show window switcher
#
# Layer Navigation:
#   - Single-press FN: Show F-keys layer
#   - Double-press FN (within 200ms): Cycle to next layer
#   - Release FN: Return to default layer (SystemInfo)
