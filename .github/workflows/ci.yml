name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libinput-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libcairo2-dev \
            librsvg2-dev \
            pkg-config
      - name: Run tests
        run: cargo test --locked
