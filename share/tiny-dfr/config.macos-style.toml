# macOS-style configuration for tiny-dfr
# This provides a macOS-like dashboard by default with system stats
# Press FN to access F-keys. Press the settings icon to access media controls.
# Copy this to /etc/tiny-dfr/config.toml to use it.
#
# Button Commands:
# Buttons can execute shell commands when pressed by adding: Command = "your-command"
# Example: { Icon = "window", Button = "ActiveWorkspace", Command = "hyprctl dispatch workspace 1" }

# Default layer to show on startup
# Options: "SystemInfo", "FKeys", "Media"
DefaultLayer = "SystemInfo"

# Show button outlines for clarity
ShowButtonOutlines = true

# Pixel shift for screen longevity (optional)
EnablePixelShift = false

# Font settings
FontTemplate = ":bold"

# Brightness settings
AdaptiveBrightness = true
ActiveBrightness = 128

# FN has a fixed meaning in this config: show F-keys while held.
DoublePressSwitchLayers = 0

# ESC is not added automatically; add `{ Text = "esc", Action = "Esc" }` to any
# layer that should have one. This config leaves it off.

# Keep root privileges so Hyprland IPC remains accessible when tiny-dfr is
# launched with sudo while Hyprland runs as your user.
DropPrivileges = false

# SystemInfoLayerKeys = Default dashboard view (shown without FN pressed)
# This shows system information like macOS Touch Bar
#
# The stats live in a "pullout": collapsed, the layer shows the title/workspace
# plus a "<" toggle and the last 2 pullout buttons (battery, time). Pressing "<"
# slides a panel out from the right over the parent, revealing all the stats;
# ">" collapses it again.
#   Button = "pullout"  marks the pullout; it is replaced in place by the toggle.
#   Option = "2"        how many trailing Children stay visible while collapsed.
#   Stretch = 0.66      fraction of the bar the expanded panel covers (0.25-0.95).
#   Children = [...]    the full set of buttons, shown left-to-right when expanded.
SystemInfoLayerKeys = [
    # Switch to media controls
    { Icon = "settings", LayerToggle = "Media", Action = [], Stretch = 1 },

    # Active window title from Hyprland.
    { Button = "ActiveWindow", Action = [], Stretch = 5 },

    # Current workspace/desktop from Hyprland.
    { Icon = "window", Button = "ActiveWorkspace", Action = [], Stretch = 1 },

    # Pullout: stats that expand over the right ~2/3 of the bar.
    { Button = "pullout", Option = "2", Stretch = 0.66, Children = [
        { Icon = "cpu", Button = "CpuUsage", Action = [], Stretch = 2 },
        { Icon = "memory", Button = "MemoryUsage", Action = [], Stretch = 2 },
        { Button = "battery", Option = "both", Action = [], Stretch = 2 },
        { Button = "time", Option = "24hr", Action = [], Stretch = 2 },
    ] },
]

# PrimaryLayerKeys = FN layer (shown when FN is pressed)
# This layer contains F-keys
PrimaryLayerKeys = [
    { Text = "F1",  Action = "F1"  },
    { Text = "F2",  Action = "F2"  },
    { Text = "F3",  Action = "F3"  },
    { Text = "F4",  Action = "F4"  },
    { Text = "F5",  Action = "F5"  },
    { Text = "F6",  Action = "F6"  },
    { Text = "F7",  Action = "F7"  },
    { Text = "F8",  Action = "F8"  },
    { Text = "F9",  Action = "F9"  },
    { Text = "F10", Action = "F10" },
    { Text = "F11", Action = "F11" },
    { Text = "F12", Action = "F12" }
]

# MediaLayerKeys = Media controls layer (shown after pressing settings icon)
# Press < to return to the system info screen
MediaLayerKeys = [
    { Text = "<", LayerToggle = "SystemInfo", Action = [], Stretch = 1 },

    # Brightness controls
    { Icon = "brightness_low",  Action = "BrightnessDown" },
    { Icon = "brightness_high", Action = "BrightnessUp"   },
    
    # Microphone
    { Icon = "mic_off",         Action = "MicMute"        },
    
    # Search
    { Icon = "search",          Action = "Search"         },
    
    # Keyboard backlight
    { Icon = "backlight_low",   Action = "IllumDown"      },
    { Icon = "backlight_high",  Action = "IllumUp"        },
    
    # Media controls
    { Icon = "fast_rewind",     Action = "PreviousSong"   },
    { Icon = "play_pause",      Action = "PlayPause"      },
    { Icon = "fast_forward",    Action = "NextSong"       },
    
    # Volume controls
    { Icon = "volume_off",      Action = "Mute"           },
    { Icon = "volume_down",     Action = "VolumeDown"     },
    { Icon = "volume_up",       Action = "VolumeUp"       }
]
